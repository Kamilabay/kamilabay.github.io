<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About Art</title>

<style>
body { 
    font-family: Arial, sans-serif; 
    margin: 0;
    background: #f7f7f7; 
    color: #333;
}

/* меню */
nav { 
    text-align: center; 
    padding: 20px; 
}
nav a { 
    margin: 0 10px; 
    cursor: pointer; 
    text-decoration: underline; 
    color: #0077cc;
}

/* заголовок */
h1 { 
    text-align: center; 
    margin-top: 20px; 
}

/* описание */
.description {
    text-align: center;
    max-width: 600px;
    margin: 0 auto 40px auto;
}

/* галерея */
.gallery {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 30px;
    padding: 20px;
}

/* карточка */
.artwork {
    background: white;
    padding: 15px;
    border-radius: 10px;
    width: 300px;
}

/* картинки */
.artwork img {
    width: 100%;
    border-radius: 10px;
}

/* текст под картиной */
.artwork p {
    margin-top: 10px;
}
</style>
</head>

<body>

<!-- ЯЗЫКИ -->
<nav>
  <a onclick="setLang('ru')">Русский</a> | 
  <a onclick="setLang('en')">English</a> | 
  <a onclick="setLang('kz')">Қазақша</a>
</nav>

<h1 id="title"></h1>
<p class="description" id="description"></p>

<!-- ГАЛЕРЕЯ -->
<div class="gallery">

    <div class="artwork">
        <img src="images/art1.jpg" alt="Картина 1">
        <p id="art1-text"></p>
    </div>

    <div class="artwork">
        <img src="images/art2.jpg" alt="Картина 2">
        <p id="art2-text"></p>
    </div>

</div>

<script>
// тексты
const texts = {
  ru: {
    title: "ОБ ИСКУССТВЕ",
    description: "Проект о картинах, их смыслах и скрытых деталях.",
    art1: "Плот Медузы — драма, отчаяние и надежда.",
    art2: "Картина 2 — добавь свой текст."
  },
  en: {
    title: "ABOUT ART",
    description: "A project about paintings, meanings and hidden details.",
    art1: "The Raft of the Medusa — drama, despair and hope.",
    art2: "Artwork 2 — add your text."
  },
  kz: {
    title: "ӨНЕР ТУРАЛЫ",
    description: "Картиналар, олардың мағынасы және жасырын детальдар туралы жоба.",
    art1: "«Медуза салы» — драма, үміт және үмітсіздік.",
    art2: "2-картина — өз мәтініңді қос."
  }
};

// смена языка
function setLang(lang) {
    document.getElementById("title").innerText = texts[lang].title;
    document.getElementById("description").innerText = texts[lang].description;
    document.getElementById("art1-text").innerText = texts[lang].art1;
    document.getElementById("art2-text").innerText = texts[lang].art2;
}

// язык по умолчанию
setLang('ru');
</script>

</body>
</html>
