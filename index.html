<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About Art</title>

<style>
body { 
    font-family: Arial, sans-serif; 
    margin: 0;
    background: #f7f7f7; 
    color: #333;
}

/* меню */
nav { 
    text-align: center; 
    padding: 20px; 
}
nav a { 
    margin: 0 10px; 
    cursor: pointer; 
    text-decoration: none; 
    color: #555;
}
nav a:hover {
    color: black;
}

/* заголовок */
h1 { 
    text-align: center; 
    margin-top: 20px; 
    font-weight: normal;
    letter-spacing: 2px;
}

/* описание */
.description {
    text-align: center;
    max-width: 600px;
    margin: 0 auto 50px auto;
    color: #666;
}

/* галерея */
.gallery {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 40px;
    padding: 20px;
}

/* карточка */
.artwork {
    width: 300px;
    text-align: center;
}

/* картинка */
.artwork img {
    width: 100%;
    display: block;
}

/* название */
.artwork p {
    margin-top: 10px;
    font-size: 14px;
    color: #444;
}
</style>
</head>

<body>

<nav>
  <a onclick="setLang('ru')">RU</a>
  <a onclick="setLang('en')">EN</a>
  <a onclick="setLang('kz')">KZ</a>
</nav>

<h1 id="title"></h1>
<p class="description" id="description"></p>

<div class="gallery">

    <div class="artwork">
        <img src="images/art1.jpg" alt="art">
        <p id="art1-text"></p>
    </div>

    <div class="artwork">
        <img src="images/art2.jpg" alt="art">
        <p id="art2-text"></p>
    </div>

</div>

<script>
const texts = {
  ru: {
    title: "ОБ ИСКУССТВЕ",
    description: "Пространство для изучения искусства, его смыслов и скрытых деталей.",
    art1: "Плот Медузы",
    art2: "Название картины"
  },
  en: {
    title: "ABOUT ART",
    description: "A space for exploring art, its meanings and hidden details.",
    art1: "The Raft of the Medusa",
    art2: "Artwork Title"
  },
  kz: {
    title: "ӨНЕР ТУРАЛЫ",
    description: "Өнерді, оның мағынасын және жасырын детальдарын зерттеу кеңістігі.",
    art1: "Медуза салы",
    art2: "Картина атауы"
  }
};

function setLang(lang) {
    document.getElementById("title").innerText = texts[lang].title;
    document.getElementById("description").innerText = texts[lang].description;
    document.getElementById("art1-text").innerText = texts[lang].art1;
    document.getElementById("art2-text").innerText = texts[lang].art2;
}

setLang('ru');
</script>

</body>
</html>
